<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmiSea | Maritime Compliance Solutions</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --text-color: #e6f1ff;
            --accent-color: #64ffda;
            --secondary-text: #8892b0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 90%;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        /* Simulacija tvog logotipa s krugom i sidrom */
        .logo-placeholder {
            width: 100px;
            height: 100px;
            border: 3px solid var(--accent-color);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .tagline {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: var(--accent-color);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .description {
            margin-top: 30px;
            color: var(--secondary-text);
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .features {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--accent-color);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
        }

        .footer a {
            color: var(--secondary-text);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            border-bottom: 1px dashed var(--secondary-text);
        }

        .footer a:hover {
            color: var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
        }

        /* Jednostavna animacija za ulaz */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <div class="logo-container">
            <div class="logo-placeholder">⚓</div>
            <h1>EmiSea</h1>
            <div class="tagline">The Future of Maritime Compliance</div>
        </div>

        <p class="description">
            Precizna automatizacija izvještavanja za pomorsku industriju. 
            Sustav za izračun emisija, ETS prava i FuelEU deficita u završnoj je fazi testiranja.
        </p>

        <div class="features">
            <span>• EU MRV</span>
            <span>• IMO DCS</span>
            <span>• EU ETS</span>
            <span>• FuelEU Maritime</span>
        </div>
    </div>

    <div class="footer fade-in">
        <p>Kontaktirajte nas za rani pristup:</p>
        <a href="mailto:info@emisea.eu">info@emisea.eu</a>
    </div>

</body>
</html>
