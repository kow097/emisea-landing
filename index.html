<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmiSea | Maritime Compliance Solutions</title>
    <style>
        :root {
            /* Boje inspirirane starim dizajnom i logom */
            --bg-color: #0a192f;
            --text-color: #ffffff; /* Čisti bijeli tekst */
            --accent-color: #64ffda; /* Tirkizna za akcente */
            --secondary-text: #8892b0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            width: 90%;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .main-logo {
            width: 120px; /* Prilagodi veličinu loga */
            height: auto;
            /* Uklonjen glow i shadow, čisti flat logo */
            margin-bottom: 15px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            letter-spacing: 3px;
            font-weight: 800;
            color: var(--text-color);
        }

        .tagline {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            color: var(--accent-color);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
        }

        .description {
            margin-top: 40px;
            color: var(--secondary-text);
            line-height: 1.8;
            font-size: 1.15rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .highlight {
            color: var(--text-color);
            font-weight: 600;
        }

        .features {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .feature-item {
            /* Čisti tirkizni border, bez sjaja */
            border: 1px solid var(--accent-color);
            padding: 5px 12px;
            border-radius: 4px;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
        }

        .footer p {
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--secondary-text);
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: none; /* Uklonjena tranzicija */
            border-bottom: 1px dashed var(--accent-color); /* Točkasta linija ispod */
        }

        .footer a:hover {
            letter-spacing: normal;
            /* Na hover se samo malo podeblja, bez glow efekta i rasta slova */
            border-bottom: 2px solid var(--accent-color);
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-height: 600px) {
            .footer { position: relative; margin-top: 50px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <div class="logo-container">
            <img src="logo.png" alt="EmiSea Logo" class="main-logo">
            <h1>EmiSea</h1>
            <div class="tagline">Maritime Compliance Excellence</div>
        </div>

        <p class="description">
            Napredna automatizacija za globalne regulative. 
            Precizno praćenje emisija, optimizacija <span class="highlight">EU ETS</span> troškova i 
            upravljanje <span class="highlight">FuelEU Maritime Balance-om</span> (Surplus/Deficit).
        </p>

        <div class="features">
            <span class="feature-item">EU MRV</span>
            <span class="feature-item">IMO DCS</span>
            <span class="feature-item">EU ETS</span>
            <span class="feature-item">FuelEU</span>
        </div>
    </div>

    <div class="footer fade-in">
        <p>Zatražite rani pristup i demo izvještaj:</p>
        <a href="mailto:info@emisea.eu">info@emisea.eu</a>
    </div>

</body>
</html>
